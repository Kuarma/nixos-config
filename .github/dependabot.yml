---
version: 2

multi-ecosystem-groups:
  nix-all:
    schedule:
      interval: daily

updates:
  - package-ecosystem: "nix"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "nix-all"

  - package-ecosystem: "nix"
    directory: "/ci"
    patterns:
      - "*"
    multi-ecosystem-group: "nix-all"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"
